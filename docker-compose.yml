        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      # db-migrate:
      #   condition: service_completed_successfully
    networks:
      - TalentSYNC-networks
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4002/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  resume-parser-worker:
    build:
