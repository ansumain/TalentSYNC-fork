      NODE_ENV: production
      EMAIL_SERVICE: gmail
      EMAIL_USER: mfsi.ansuman@gmail.com
      EMAIL_PASSWORD: uqvt jjlk djxl pqtq
      EMAIL_FROM: TalentSYNC <mfsi.ansuman@gmail.com>
      QUEUE_ANALYTICS_EXPORT: analytics.export.report
      QUEUE_ANALYTICS_EXPORT_RETRY: analytics.export.retry
