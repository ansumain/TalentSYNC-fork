    container_name: TalentSYNC-analytics-worker
    restart: unless-stopped
    environment:
      ACCESS_TOKEN_SECRET: ACCESS_TOKEN_SECRET
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: rms_user
      DB_PASSWORD: rms_password
      DB_NAME: rms_db
