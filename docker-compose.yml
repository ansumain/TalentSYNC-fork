      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: rms_user
      DB_PASSWORD: rms_password
      DB_NAME: rms_db
      RABBIT_MQ_HOST: rabbitmq
      RABBIT_MQ_PORT: 5672
      RABBIT_MQ_USER: admin
      RABBIT_MQ_PASSWORD: password
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: false
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: resumes
      NODE_ENV: production
      EMAIL_SERVICE: gmail
      EMAIL_USER: mfsi.ansuman@gmail.com
