  auth-service:
    build:
      context: .
      dockerfile: ./apps/auth-service/Dockerfile
    container_name: TalentSYNC-auth-service
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      PORT: 4001
      ACCESS_TOKEN_SECRET: ACCESS_TOKEN_SECRET
      REFRESH_TOKEN_SECRET: REFRESH_TOKEN_SECRET
      JWT_EXPIRES_IN: 15m
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: rms_user
      DB_PASSWORD: rms_password
      DB_NAME: rms_db
      EMAIL_SERVICE: gmail
      EMAIL_USER: mfsi.ansuman@gmail.com
      EMAIL_PASSWORD: "uqvt jjlk djxl pqtq"
      EMAIL_FROM: "TalentSYNC <mfsi.ansuman@gmail.com>"
      FRONTEND_URL: http://localhost
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      # db-migrate:
      #   condition: service_completed_successfully
    networks:
      - TalentSYNC-networks
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4001/health" ]
      interval: 30s
      timeout: 10s
