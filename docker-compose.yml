services:
  postgres:
    image: postgres:15-alpine
    container_name: TalentSYNC-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rms_user
      POSTGRES_PASSWORD: rms_password
      POSTGRES_DB: rms_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - TalentSYNC-networks
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U rms_user -d rms_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management
    container_name: TalentSYNC-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - TalentSYNC-networks
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 3

  minio:
    image: minio/minio:latest
    container_name: TalentSYNC-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - TalentSYNC-networks

  minio-init:
    image: minio/mc:latest
    container_name: TalentSYNC-minio-init
    restart: on-failure
    depends_on:
      minio:
        condition: service_started
    networks:
      - TalentSYNC-networks
    entrypoint: >
      /bin/sh -c "
      i=0;
      until mc alias set local http://minio:9000 minioadmin minioadmin123; do
        i=$((i+1));
        if [ $i -ge 60 ]; then
          echo 'MinIO not reachable after 120s'; exit 1;
        fi;
        echo 'Waiting for MinIO...'; sleep 2;
      done &&
      mc mb --ignore-existing local/resumes
      "

  # db-migrate:
  #   build:
