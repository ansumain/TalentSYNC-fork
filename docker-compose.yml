version: "3.9"

services:
  postgres: 
    image: postgres:15
    container_name: rms-postgres
    restart: always
    environment:
      POSTGRES_USER: rms_user
      POSTGRES_PASSWORD: rms_password
      POSTGRES_DB: rms_db
    ports:
      - "5432:5432"
    volumes:
      - D:/rms_postgres_data:/var/lib/postgresql/data