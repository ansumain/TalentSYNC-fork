  nginx:
    image: nginx:alpine
    container_name: TalentSYNC-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      auth-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
      web-app:
        condition: service_started
    networks:
      - TalentSYNC-networks

volumes:
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local
  minio_data:
    driver: local
  resume_temp:
    driver: local

networks:
  TalentSYNC-networks:
    driver: bridge
