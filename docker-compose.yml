services:
  postgres:
    image: postgres:15-alpine
    container_name: TalentSYNC-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rms_user
      POSTGRES_PASSWORD: rms_password
      POSTGRES_DB: rms_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - TalentSYNC-networks
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U rms_user -d rms_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management
    container_name: TalentSYNC-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - TalentSYNC-networks
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 3

  db-migrate:
    build:
      context: .
      dockerfile: ./apps/auth-service/Dockerfile
    container_name: TalentSYNC-db-migrate
    restart: "no"
    command: [ "npx", "sequelize-cli", "db:migrate" ]
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: rms_user
      DB_PASSWORD: rms_password
      DB_NAME: rms_db
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - TalentSYNC-networks

  auth-service:
    build:
      context: .
      dockerfile: ./apps/auth-service/Dockerfile
    container_name: TalentSYNC-auth-service
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      PORT: 4001
      ACCESS_TOKEN_SECRET: ACCESS_TOKEN_SECRET
      REFRESH_TOKEN_SECRET: REFRESH_TOKEN_SECRET
      JWT_EXPIRES_IN: 15m
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: rms_user
      DB_PASSWORD: rms_password
      DB_NAME: rms_db
      EMAIL_SERVICE: gmail
      EMAIL_USER: mfsi.ansuman@gmail.com
      EMAIL_PASSWORD: "uqvt jjlk djxl pqtq"
      EMAIL_FROM: "TalentSYNC <mfsi.ansuman@gmail.com>"
      FRONTEND_URL: http://localhost
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    networks:
      - TalentSYNC-networks
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  resume-parser-api:
    build:
      context: .
      dockerfile: ./apps/resume-parser-service/Dockerfile
    container_name: TalentSYNC-resume-parser-api
    restart: unless-stopped
    ports:
      - "4002:4002"
    environment:
      PORT: 4002
      ACCESS_TOKEN_SECRET: ACCESS_TOKEN_SECRET
      REFRESH_TOKEN_SECRET: REFRESH_TOKEN_SECRET
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: rms_user
      DB_PASSWORD: rms_password
      DB_NAME: rms_db
      RABBIT_MQ_HOST: rabbitmq
      RABBIT_MQ_PORT: 5672
      RABBIT_MQ_USER: admin
      RABBIT_MQ_PASSWORD: password
      NODE_ENV: development
    volumes:
      - resume_uploads:/data/uploads
      - resume_temp:/data/temp
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    networks:
      - TalentSYNC-networks
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4002/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  resume-parser-worker:
    build:
      context: .
      dockerfile: ./apps/resume-parser-service/Dockerfile
    container_name: TalentSYNC-resume-parser-worker
    restart: unless-stopped
    environment:
      ACCESS_TOKEN_SECRET: ACCESS_TOKEN_SECRET
      REFRESH_TOKEN_SECRET: REFRESH_TOKEN_SECRET
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: rms_user
      DB_PASSWORD: rms_password
      DB_NAME: rms_db
      RABBIT_MQ_HOST: rabbitmq
      RABBIT_MQ_PORT: 5672
      RABBIT_MQ_USER: admin
      RABBIT_MQ_PASSWORD: password
      NODE_ENV: development
    volumes:
      - resume_uploads:/data/uploads
      - resume_temp:/data/temp
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    networks:
      - TalentSYNC-networks
    command: [ "pnpm", "--filter", "@talentsync/resume-parser-service", "worker:start" ]

  application-service:
    build:
      context: .
      dockerfile: ./apps/application-service/Dockerfile
    container_name: TalentSYNC-applicaton-service
    restart: unless-stopped
    ports:
      - "4003:4003"
    environment:
      PORT: 4003
      ACCESS_TOKEN_SECRET: ACCESS_TOKEN_SECRET
      REFRESH_TOKEN_SECRET: REFRESH_TOKEN_SECRET
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: rms_user
      DB_PASSWORD: rms_password
      DB_NAME: rms_db
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    networks:
      - TalentSYNC-networks
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4003/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web-app:
    container_name: TalentSYNC-web-app
    build:
      context: .
      dockerfile: ./apps/web-app/Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      auth-service:
        condition: service_healthy
    networks:
      - TalentSYNC-networks

  nginx:
    image: nginx:alpine
    container_name: TalentSYNC-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      auth-service:
        condition: service_healthy
      web-app:
        condition: service_started
    networks:
      - TalentSYNC-networks

volumes:
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local
  resume_uploads:
    driver: local
  resume_temp:
    driver: local

networks:
  TalentSYNC-networks:
    driver: bridge
