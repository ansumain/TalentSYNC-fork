name: Release
on:
  workflow_dispatch:
    inputs:
      source:
        description: 'Trigger source'
        required: false
        default: 'monodog'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
      - name: Install dependencies
        run: pnpm install
      - name: Build all services
        run: pnpm turbo build
