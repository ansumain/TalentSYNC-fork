name: CI Pipeline

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to build'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build
        run: |
          echo "Building package: ${{ github.event.inputs.package }}"
          sleep 10
          echo "Build completed successfully!"
