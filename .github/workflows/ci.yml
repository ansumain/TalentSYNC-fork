name: CI Pipeline

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to build'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build
        run: |
          echo "Building package: ${{ github.event.inputs.package }}"
          if [ -n "${{ github.event.inputs.package }}" ]; then
            pnpm turbo build --filter=${{ github.event.inputs.package }}
          else
            pnpm turbo build
          fi
          echo "Build completed successfully!"
