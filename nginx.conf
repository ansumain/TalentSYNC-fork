events {}

http {
    upstream web_app { 
      server web-app:5173; 
    }
    upstream auth_service {
      server auth-service:4001;
    }
    upstream resume_parser_service { 
      server resume-parser-api:4002;
    }
    upstream application_service { 
      server application-service:4003;
    }

    server {
        listen 80;

        # Shared Proxy Headers
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 10M; 

        # API Docs (dev only)
        location /docs {
            proxy_pass http://application_service;
        }

        location /api-docs {
            proxy_pass http://application_service;
        }

        # Auth Service
        location /api/auth/ {
            proxy_pass http://auth_service;
        }

        location /api/users {
            proxy_pass http://auth_service;
        }

        location /api/admin {
            proxy_pass http://auth_service;
        }

        # Candidate/Application Service
        location /api/candidate/ {
            proxy_pass http://application_service;
        }

        location /api/jobs {
            proxy_pass http://application_service;
        }

        location /api/applications {
            proxy_pass http://application_service;
        }

        location /api/skills {
            proxy_pass http://application_service;
        }

        location /api/interviews {
            proxy_pass http://application_service;
        }

        # Resume Parser Service
        location /api/resume/ {
            proxy_pass http://resume_parser_service;
        }

        location /files {
            proxy_pass http://resume_parser_service;
        }

        # Frontend - Web App 
        location / {
            proxy_pass http://web_app;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_cache_bypass $http_upgrade;
        }
    }
}
